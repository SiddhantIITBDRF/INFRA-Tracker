<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Projects Dashboard</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Environment Polyfill for UMD Libraries -->
    <script>window.process = { env: { NODE_ENV: 'production' } };</script>

    <!-- React & ReactDOM (Pinned to stable 18.2.0) -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Recharts and its dependencies (Pinned to stable versions) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
    <div id="root">
        <!-- Temporary Loading State while Babel compiles the React code -->
        <div class="flex h-screen w-full items-center justify-center">
            <div class="text-center space-y-4">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                <h2 class="text-xl font-bold text-slate-700">Loading Dashboard Engine...</h2>
                <p class="text-slate-500">Compiling React components locally.</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        // -- Constants & Colors -- //
        const COLORS = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#64748b'];

        // -- Inline Icons (Replacing external Lucide dependency for a standalone file) -- //
        const IconBase = ({ d, size=20, className="", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d ? <path d={d} /> : children}
            </svg>
        );
        const LayoutDashboard = (p) => <IconBase {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>;
        const AlertCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const IndianRupee = (p) => <IconBase {...p}><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></IconBase>;
        const Building2 = (p) => <IconBase {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></IconBase>;
        const List = (p) => <IconBase {...p}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></IconBase>;
        const RefreshCw = (p) => <IconBase {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;
        const CheckCircle2 = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconBase>;
        const TrendingUp = (p) => <IconBase {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></IconBase>;
        const AlertTriangle = (p) => <IconBase {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconBase>;

        // -- Robust CSV Parser -- //
        const parseCSV = (text) => {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (char === '"' && inQuotes && nextChar === '"') {
                    currentCell += '"'; i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell.trim()); currentCell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') i++;
                    currentRow.push(currentCell.trim());
                    rows.push(currentRow);
                    currentRow = []; currentCell = '';
                } else {
                    currentCell += char;
                }
            }
            if (currentCell || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }
            if (rows.length > 0 && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === '') rows.pop();
            if (rows.length === 0) return { data: [], meta: { fields: [] } };
            
            const fields = rows[0];
            const data = rows.slice(1).map(row => {
                const obj = {};
                fields.forEach((field, i) => {
                    let val = row[i] !== undefined ? row[i] : '';
                    if (val !== '') {
                        const num = Number(val.replace(/,/g, ''));
                        if (!isNaN(num)) val = num;
                    }
                    obj[field] = val;
                });
                return obj;
            });
            return { data, meta: { fields } };
        };

        // -- Data Normalization -- //
        const cleanNum = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            const cleaned = String(val).replace(/[^0-9.-]+/g, '');
            return Number(cleaned) || 0;
        };

        const normalizeData = (rawData) => {
            if (!rawData || !rawData.length) return [];
            const keys = Object.keys(rawData[0]);
            
            const matchKey = (patterns) => {
                for (const p of patterns) {
                    const found = keys.find(k => k.toLowerCase().includes(p.toLowerCase()));
                    if (found) return found;
                }
                return keys[0]; 
            };

            const map = {
                name: matchKey(['project', 'name', 'title']),
                category: matchKey(['category', 'type', 'department']),
                cost: matchKey(['cost', 'est', 'budget']),
                committed: matchKey(['commit', 'pledged']),
                received: matchKey(['receive', 'in hand']),
                gap: matchKey(['gap', 'shortfall', 'required']),
                area: matchKey(['area', 'sq ft', 'built', 'size']),
                stage: matchKey(['stage', 'phase', 'status progress']),
                completion: matchKey(['complete', '% done', 'progress']),
                priority: matchKey(['priority', 'urgency']),
                status: matchKey(['status', 'state']),
                donor: matchKey(['donor', 'sponsor']),
                wbs: matchKey(['wbs', 'id', 'code']),
                start: matchKey(['start', 'begin']),
                target: matchKey(['target', 'end', 'finish'])
            };

            return rawData.map(row => ({
                _raw: row,
                name: row[map.name] || 'Unnamed Project',
                category: row[map.category] || 'General',
                cost: cleanNum(row[map.cost]),
                committed: cleanNum(row[map.committed]),
                received: cleanNum(row[map.received]),
                gap: cleanNum(row[map.gap]),
                area: cleanNum(row[map.area]),
                stage: row[map.stage] || 'Planning',
                completion: cleanNum(row[map.completion]),
                priority: String(row[map.priority] || '').toLowerCase(),
                status: row[map.status] || 'Active',
                donor: row[map.donor] || '-',
                wbs: row[map.wbs] || '-',
                start: row[map.start] || '-',
                target: row[map.target] || '-'
            }));
        };

        // -- Reusable UI Components -- //
        const KpiCard = ({ title, value, subtitle, icon: Icon, colorClass }) => (
            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col">
                <div className="flex items-center justify-between mb-4">
                    <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider">{title}</h3>
                    <div className={`p-2 rounded-lg ${colorClass} bg-opacity-10`}>
                        <Icon size={20} className={colorClass.replace('bg-', 'text-')} />
                    </div>
                </div>
                <div className="text-3xl font-black text-slate-800">{value}</div>
                {subtitle && <div className="text-sm text-slate-500 mt-2 font-medium">{subtitle}</div>}
            </div>
        );

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="bg-slate-900 text-white p-3 rounded-lg shadow-xl border border-slate-700 text-sm z-50">
                        <p className="font-bold mb-2 border-b border-slate-700 pb-1">{label}</p>
                        {payload.map((entry, index) => (
                            <div key={index} className="flex items-center space-x-2 mt-1">
                                <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: entry.color || entry.payload.fill }} />
                                <span className="text-slate-300">{entry.name}:</span>
                                <span className="font-semibold">
                                    {Number.isInteger(entry.value) ? entry.value.toLocaleString() : entry.value.toFixed(2)}
                                </span>
                            </div>
                        ))}
                    </div>
                );
            }
            return null;
        };

        // -- Main App Component -- //
        function App() {
            const defaultUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfkY7tZfT6wOI7d6bhneIshAORjJci0ooYpEvqEfWw0cTuVcNbPvpIy9UE5dm-mA/pub?output=csv";
            const [url, setUrl] = useState(defaultUrl);
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('overview');
            const [categoryFilter, setCategoryFilter] = useState('All');

            const loadData = async () => {
                setLoading(true); setError(null);
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const csvText = await response.text();
                    const results = parseCSV(csvText);
                    
                    if (results.data.length === 0) throw new Error("No data found in CSV");
                    
                    const normalized = normalizeData(results.data);
                    setData(normalized);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { loadData(); }, []);

            const metrics = useMemo(() => {
                const totalProjects = data.length;
                const totalCost = data.reduce((acc, r) => acc + r.cost, 0);
                const totalCommitted = data.reduce((acc, r) => acc + r.committed, 0);
                const totalGap = data.reduce((acc, r) => acc + r.gap, 0);
                const totalArea = data.reduce((acc, r) => acc + r.area, 0);
                const avgCompletion = totalProjects ? (data.reduce((acc, r) => acc + r.completion, 0) / totalProjects) : 0;
                
                const highPriority = data.filter(r => r.priority.includes('high') || r.priority === '1');
                const categories = ['All', ...new Set(data.map(d => d.category))];

                const finByCategory = Object.entries(
                    data.reduce((acc, row) => {
                        if (!acc[row.category]) acc[row.category] = { cost: 0, committed: 0, gap: 0 };
                        acc[row.category].cost += row.cost;
                        acc[row.category].committed += row.committed;
                        acc[row.category].gap += row.gap;
                        return acc;
                    }, {})
                ).map(([name, vals]) => ({ name, ...vals })).sort((a,b) => b.cost - a.cost);

                const stageDist = Object.entries(
                    data.reduce((acc, row) => {
                        acc[row.stage] = (acc[row.stage] || 0) + 1;
                        return acc;
                    }, {})
                ).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value);

                return { totalProjects, totalCost, totalCommitted, totalGap, totalArea, avgCompletion, highPriority, finByCategory, stageDist, categories };
            }, [data]);

            const formatCr = (val) => `₹${(val).toLocaleString('en-IN', { maximumFractionDigits: 1 })}`;
            const formatArea = (val) => `${val.toLocaleString('en-IN')} sq ft`;

            const renderOverview = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <KpiCard title="Total Projects" value={metrics.totalProjects} icon={LayoutDashboard} colorClass="bg-blue-500" />
                        <KpiCard title="Total Est. Cost" value={formatCr(metrics.totalCost)} icon={IndianRupee} colorClass="bg-emerald-500" />
                        <KpiCard title="Funds Committed" value={formatCr(metrics.totalCommitted)} icon={TrendingUp} colorClass="bg-indigo-500" />
                        <KpiCard title="Funding Gap" value={formatCr(metrics.totalGap)} icon={AlertTriangle} colorClass="bg-rose-500" />
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-[400px] flex flex-col">
                            <h3 className="font-bold text-slate-800 mb-6">Finance Summary</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={metrics.finByCategory} margin={{ bottom: 20 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                    <XAxis dataKey="name" tick={{fontSize: 12}} interval={0} angle={-25} textAnchor="end" />
                                    <YAxis tick={{fontSize: 12}} tickFormatter={(v) => `₹${v}`} />
                                    <RechartsTooltip content={<CustomTooltip />} />
                                    <Legend wrapperStyle={{ paddingTop: '20px' }} />
                                    <Bar dataKey="committed" name="Committed" stackId="a" fill="#10b981" radius={[0, 0, 4, 4]} />
                                    <Bar dataKey="gap" name="Funding Gap" stackId="a" fill="#f43f5e" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                        
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-[400px] flex flex-col">
                            <h3 className="font-bold text-slate-800 mb-6">Logistics Summary (By Stage)</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                    <Pie data={metrics.stageDist} cx="50%" cy="50%" innerRadius={70} outerRadius={110} paddingAngle={2} dataKey="value">
                                        {metrics.stageDist.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Pie>
                                    <RechartsTooltip content={<CustomTooltip />} />
                                    <Legend layout="vertical" verticalAlign="middle" align="right" wrapperStyle={{ fontSize: '12px' }} />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );

            const renderPriority = () => (
                <div className="animate-in fade-in duration-500 max-w-5xl mx-auto mt-8">
                    {metrics.highPriority.length === 0 ? (
                        <div className="bg-white border border-emerald-200 rounded-2xl p-10 text-center shadow-sm">
                            <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <CheckCircle2 size={32} />
                            </div>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">No high-priority projects currently.</h2>
                            <p className="text-slate-500 max-w-md mx-auto">
                                Add a <code>Priority</code> column to your Google Sheet and set a project to <code>High</code> to show it here.
                            </p>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center">
                                <AlertCircle className="text-rose-500 mr-2" /> Critical Path Projects
                            </h2>
                            {metrics.highPriority.map((proj, i) => (
                                <div key={i} className="bg-white border-l-4 border-rose-500 rounded-r-xl p-6 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div>
                                        <div className="text-xs font-bold text-rose-500 uppercase tracking-wider mb-1">{proj.category} • Stage: {proj.stage}</div>
                                        <h3 className="text-lg font-bold text-slate-800">{proj.name}</h3>
                                        <div className="text-sm text-slate-500 mt-1 flex items-center space-x-4">
                                            <span>Target: <strong className="text-slate-700">{proj.target}</strong></span>
                                            <span>Area: <strong className="text-slate-700">{formatArea(proj.area)}</strong></span>
                                        </div>
                                    </div>
                                    <div className="flex space-x-8 text-right bg-slate-50 p-4 rounded-lg">
                                        <div><div className="text-xs text-slate-500 font-medium">Est. Cost</div><div className="font-bold text-slate-800">{formatCr(proj.cost)}</div></div>
                                        <div><div className="text-xs text-slate-500 font-medium">Gap</div><div className="font-bold text-rose-600">{formatCr(proj.gap)}</div></div>
                                        <div><div className="text-xs text-slate-500 font-medium">Progress</div><div className="font-bold text-blue-600">{proj.completion}%</div></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderTable = (columnsToShow, tableData) => (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
                                <tr>
                                    {columnsToShow.map(col => <th key={col.key} className="px-6 py-4 whitespace-nowrap">{col.label}</th>)}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {tableData.map((row, i) => (
                                    <tr key={i} className="hover:bg-slate-50/80">
                                        {columnsToShow.map(col => (
                                            <td key={col.key} className="px-6 py-4 text-slate-700 whitespace-nowrap">
                                                {col.format ? col.format(row[col.key]) : row[col.key]}
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="bg-slate-50 px-6 py-3 border-t border-slate-200 text-xs text-slate-500 font-medium text-right">
                        Showing {tableData.length} records
                    </div>
                </div>
            );

            const renderFinances = () => (
                <div className="space-y-6">
                    <h2 className="text-xl font-bold text-slate-800 mb-6">Financial Overview</h2>
                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-[450px]">
                        <ResponsiveContainer width="100%" height="100%">
                            <BarChart data={data.sort((a,b) => b.cost - a.cost).slice(0, 15)} margin={{ bottom: 50 }}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                <XAxis dataKey="name" tick={{fontSize: 11}} interval={0} angle={-45} textAnchor="end" />
                                <YAxis tick={{fontSize: 12}} tickFormatter={(v) => `₹${v}`} />
                                <RechartsTooltip content={<CustomTooltip />} />
                                <Legend wrapperStyle={{ paddingTop: '10px' }} />
                                <Bar dataKey="committed" name="Committed (Cr)" fill="#10b981" radius={[0, 0, 4, 4]} stackId="a" />
                                <Bar dataKey="gap" name="Gap (Cr)" fill="#f43f5e" radius={[4, 4, 0, 0]} stackId="a" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                    {renderTable([
                        { key: 'name', label: 'Project Name' }, { key: 'category', label: 'Category' },
                        { key: 'cost', label: 'Est. Cost', format: formatCr }, { key: 'committed', label: 'Committed', format: formatCr },
                        { key: 'received', label: 'Received', format: formatCr }, { key: 'gap', label: 'Gap', format: formatCr },
                        { key: 'donor', label: 'Donor / Sponsor' }
                    ], data)}
                </div>
            );

            const renderLogistics = () => (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <KpiCard title="Total Built-up Area" value={formatArea(metrics.totalArea)} icon={Building2} colorClass="bg-blue-500" />
                        <KpiCard title="Average Completion" value={`${metrics.avgCompletion.toFixed(1)}%`} icon={TrendingUp} colorClass="bg-indigo-500" />
                    </div>
                    {renderTable([
                        { key: 'name', label: 'Project Name' }, { key: 'stage', label: 'Stage / Progress' },
                        { key: 'completion', label: '% Complete', format: (v) => <span className="font-bold text-blue-600">{v}%</span> },
                        { key: 'area', label: 'Built-up Area', format: formatArea },
                        { key: 'start', label: 'Start Date' }, { key: 'target', label: 'Target Date' }, { key: 'status', label: 'Status' }
                    ], data)}
                </div>
            );

            const renderAllProjects = () => {
                const filtered = categoryFilter === 'All' ? data : data.filter(d => d.category === categoryFilter);
                return (
                    <div className="space-y-6 h-full flex flex-col">
                        <div className="flex flex-wrap gap-2">
                            {metrics.categories.map(cat => (
                                <button key={cat} onClick={() => setCategoryFilter(cat)}
                                    className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${categoryFilter === cat ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                        {renderTable([
                            { key: 'wbs', label: 'WBS' }, { key: 'name', label: 'Project Name' }, { key: 'category', label: 'Category' },
                            { key: 'stage', label: 'Stage' }, { key: 'completion', label: '% Done', format: (v) => `${v}%` },
                            { key: 'cost', label: 'Cost', format: formatCr }, { key: 'gap', label: 'Gap', format: formatCr },
                            { key: 'area', label: 'Area', format: formatArea }
                        ], filtered)}
                    </div>
                );
            };

            return (
                <div className="flex h-screen w-full overflow-hidden">
                    <aside className="w-64 bg-[#1a202c] text-slate-300 flex flex-col flex-shrink-0 z-20 shadow-xl">
                        <div className="p-6 border-b border-slate-700/50">
                            <div className="text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-1">IIT Bombay • Dev Office</div>
                            <h1 className="text-lg font-bold text-white tracking-tight leading-tight">Infrastructure<br/>Projects Dashboard</h1>
                        </div>
                        <nav className="flex-1 py-6 px-4 space-y-1">
                            {[
                                { id: 'overview', label: 'Overview', icon: LayoutDashboard },
                                { id: 'priority', label: `Top Priority ${metrics.highPriority ? metrics.highPriority.length : 0}`, icon: AlertCircle, color: 'text-rose-400' },
                                { id: 'finances', label: 'Finances', icon: IndianRupee },
                                { id: 'logistics', label: 'Logistics', icon: Building2 },
                                { id: 'all', label: 'All Projects', icon: List },
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all font-medium text-sm ${activeTab === item.id ? 'bg-blue-600 text-white shadow-md shadow-blue-900/20' : 'hover:bg-slate-800 hover:text-white text-slate-400'}`}>
                                    <item.icon size={18} className={item.color || (activeTab === item.id ? 'text-white' : 'text-slate-500')} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <div className="flex-1 flex flex-col h-full min-w-0">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0 z-10 shadow-sm">
                            <h2 className="text-lg font-bold text-slate-800 capitalize tracking-wide flex items-center">
                                {activeTab === 'priority' ? 'Top Priority' : activeTab}
                            </h2>
                            <div className="flex items-center space-x-3 text-sm">
                                <span className="flex items-center text-slate-500 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 mr-2 animate-pulse"></span> Live Sync
                                </span>
                                <button onClick={loadData} disabled={loading} className="flex items-center px-3 py-1.5 bg-white border border-slate-200 rounded-md shadow-sm hover:bg-slate-50 text-slate-600 font-medium disabled:opacity-50">
                                    <RefreshCw size={14} className={`mr-2 ${loading ? 'animate-spin' : ''}`} /> Refresh
                                </button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-8">
                            {loading ? (
                                <div className="flex flex-col items-center justify-center h-full space-y-4">
                                    <RefreshCw size={32} className="animate-spin text-blue-600" />
                                    <p className="text-slate-500 font-medium animate-pulse">Syncing latest spreadsheet data...</p>
                                </div>
                            ) : error ? (
                                <div className="bg-rose-50 border border-rose-200 text-rose-700 p-6 rounded-xl flex items-start space-x-4 max-w-2xl mx-auto mt-10 shadow-sm">
                                    <AlertTriangle size={24} className="shrink-0 mt-0.5" />
                                    <div><h3 className="font-bold text-lg mb-1">Sync Failed</h3><p className="opacity-90">{error}</p></div>
                                </div>
                            ) : (
                                <div className="max-w-[1400px] mx-auto">
                                    {activeTab === 'overview' && renderOverview()}
                                    {activeTab === 'priority' && renderPriority()}
                                    {activeTab === 'finances' && renderFinances()}
                                    {activeTab === 'logistics' && renderLogistics()}
                                    {activeTab === 'all' && renderAllProjects()}
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
